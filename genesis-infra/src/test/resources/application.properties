# Test Configuration for Infra Module
spring.datasource.url=jdbc:h2:mem:genesis-infra;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JWT secret for tests — fixed 64-char string, satisfies @Size(min=32)
genesis.security.jwt.secret=test-jwt-secret-only-for-tests-do-not-use-anywhere-else-32chars+
