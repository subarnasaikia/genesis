spring.application.name=genesis

# Active Profile
spring.profiles.active=dev

# Database Configuration
# Railway provides DATABASE_URL in format: postgres://user:pass@host:port/db
# For Railway: Use individual PG* variables or set DB_URL/DB_USERNAME/DB_PASSWORD
spring.datasource.url=${DB_URL:${DATABASE_URL:}}
spring.datasource.username=${DB_USERNAME:${PGUSER:}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
# Flyway owns the schema. Hibernate validate means: at boot, compare
# entity classes against the live schema and refuse to start if they
# disagree. No silent schema-fixing — every drift surfaces as a startup
# error so the dev who introduced it has to write a migration.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
# Migrations live in classpath:db/migration. V1 is a pg_dump baseline of
# the schema as of 2026-05-15; V2+ are explicit ALTERs.
# baseline-on-migrate=true lets Flyway adopt non-empty existing DBs by
# recording them at baseline-version=1, then applying V2+ on top.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=Initial schema snapshot

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=0

# Actuator Configuration
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.health.probes.enabled=true

# Server Configuration
server.port=${PORT:8080}

# Multipart upload limits (default 1MB blocks real annotation corpora like Train.conll ~9MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Logging Configuration
logging.level.com.genesis=DEBUG
logging.level.org.springframework=INFO

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# JWT Configuration
# secret is intentionally unset by default — Bean Validation on
# SecurityProperties.Jwt#secret rejects null/blank/<32-char values at boot.
genesis.security.jwt.secret=${JWT_SECRET:}
genesis.security.jwt.access-token-expiry=${JWT_ACCESS_TOKEN_EXPIRY:15m}
genesis.security.jwt.refresh-token-expiry=${JWT_REFRESH_TOKEN_EXPIRY:7d}

# CORS Configuration
# For production, set CORS_ALLOWED_ORIGINS to your frontend URL (comma-separated for multiple)
# Example: https://genesis-frontend.vercel.app,https://your-domain.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}