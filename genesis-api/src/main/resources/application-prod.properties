# Production-profile overrides. Activated by SPRING_PROFILES_ACTIVE=prod
# (docker-compose.yml passes this to the app container).
#
# All other properties are inherited from application.properties.

# CORS — drop the dev-friendly localhost fallback so a missing
# CORS_ALLOWED_ORIGINS env var fails boot loudly
# ("Could not resolve placeholder 'CORS_ALLOWED_ORIGINS'") instead of
# silently letting http://localhost:3000 through in production.
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Actuator — main props expose everything via `*` for local debugging.
# In prod expose only what monitoring + load balancers need.
# /actuator/env, /actuator/heapdump etc. would leak secrets and PII.
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized

# Logging — main props ship with show-sql=true + DEBUG on com.genesis
# for local development. In prod that floods stdout with full SQL +
# bound parameters (PII: emails, usernames, document content snippets)
# and slows the JVM. Disable SQL printing and raise levels to INFO/WARN.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.root=INFO
logging.level.com.genesis=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

# Flyway — main props set baseline-on-migrate=true so a non-empty DB can be
# adopted at version 1 without a manual `flyway baseline` step. That's fine
# for the first prod deploy of an already-running database, but after the
# initial cutover any drift between code and the live schema should fail
# loudly instead of being silently re-baselined. Switch off in prod.
spring.flyway.baseline-on-migrate=false

# Larger pool for prod traffic. Override conservative dev default of 5.
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
