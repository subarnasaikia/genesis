# Test Configuration - Uses In-Memory DB
spring.datasource.url=jdbc:h2:mem:genesis;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Flyway migrations are Postgres-specific (uuid type, postgres CHECK
# syntax, pg_dump output). Tests run against H2 in-memory and rely on
# Hibernate create-drop for schema; Flyway would fail against H2 even
# in PostgreSQL-compat mode. Re-enable per-test with TestContainers if
# we add real integration tests.
spring.flyway.enabled=false

# CORS — SecurityConfig's @Value no longer has an inline fallback (issue #26),
# so tests must declare a value here or the context fails to load.
cors.allowed-origins=http://localhost:3000
