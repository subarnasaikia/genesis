# FreezingArchRule violation store (A-009 module-boundary guard).
# The store records the CURRENT known cross-module repository/entity reaches as a
# baseline so the build stays green, while any NEW violation fails the build.
# As boundary fixes land (A-001/A-002/A-005/A-006), re-running the test auto-prunes
# the now-absent violations from the store (allowStoreUpdate=true), ratcheting down.
freeze.store.default.path=src/test/resources/archunit_store
freeze.store.default.allowStoreCreation=true
freeze.store.default.allowStoreUpdate=true
